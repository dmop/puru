name: Bug Report
description: Report a bug in puru
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce
      render: typescript
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: puru version
      placeholder: e.g. 0.1.5
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Bun
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: e.g. Node 22.0.0 or Bun 1.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15, Ubuntu 24.04, Windows 11
